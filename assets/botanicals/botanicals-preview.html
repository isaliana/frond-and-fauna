<!DOCTYPE html>
<html>
<head>
<style>
body { background: #f7c6cf; font-family: sans-serif; padding: 20px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
.card { background: white; padding: 12px; border-radius: 8px; text-align: center; }
.card img { width: 160px; height: 160px; object-fit: contain; }
.card p { margin: 8px 0 0; font-size: 12px; }
</style>
</head>
<body>
<h2>Leaves preview</h2>
<div class="grid">
  <div class="card"><img src="leaves-1.svg"><p>leaves-1</p></div>
  <div class="card"><img src="leaves-2.svg"><p>leaves-2</p></div>
  <div class="card"><img src="leaves-3.svg"><p>leaves-3</p></div>
  <div class="card"><img src="palm-leaf.svg"><p>palm-leaf</p></div>
  <div class="card"><img src="palm.svg"><p>palm</p></div>
  <div class="card"><img src="palm-sunday.svg"><p>palm-sunday</p></div>
  <div class="card"><img src="tropical-leaf.svg"><p>tropical-leaf</p></div>
</div>
</body>
</html>
